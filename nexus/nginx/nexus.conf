# HTTP server
server {
    listen 80;
    server_name _;

    # Bootstrap 例外：允許 HTTP 下載 b.ps1（bootstrap 階段 PC 尚未信任 CA，無法走 HTTPS）
    location = /b {
        proxy_pass         http://nexus:8081/repository/raw-windows-bootstrap/b.ps1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Nexus CA 憑證（HTTP 下載，供 bootstrap 階段匯入 Windows Trusted Root）
    location = /nexus.crt {
        alias              /etc/nginx/bootstrap/nexus.crt;
        default_type       "application/x-x509-ca-cert";
    }

    # README 入口：工具清單與安裝說明
    location = /readme {
        alias              /etc/nginx/bootstrap/README.html;
        default_type       "text/html";
        add_header         Content-Type "text/html; charset=utf-8";
    }

    # 其餘全部 redirect 到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS reverse proxy → Nexus
server {
    listen 443 ssl;
    server_name _;

    # --- SSL ---
    ssl_certificate     /etc/nginx/certs/nexus.crt;
    ssl_certificate_key /etc/nginx/certs/nexus.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- 允許上傳大型 nupkg / binary ---
    client_max_body_size 2G;

    # --- Chocolatey bootstrap 短路徑 ---
    location = /b {
        return 302 /repository/raw-windows-bootstrap/b.ps1;
    }

    # --- README 工具清單（瀏覽器可直接查閱）---
    location = /readme {
        alias              /etc/nginx/bootstrap/README.html;
        default_type       "text/html";
        add_header         Content-Type "text/html; charset=utf-8";
    }

    # --- Nexus CA 憑證（供 bootstrap 後續要求錯誤時手動匯入）---
    location = /nexus.crt {
        alias              /etc/nginx/bootstrap/nexus.crt;
        default_type       "application/x-x509-ca-cert";
    }

    # --- Proxy 到 Nexus ---
    location / {
        proxy_pass         http://nexus:8081;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Port  $server_port;

        # WebSocket（Nexus UI 需要）
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
